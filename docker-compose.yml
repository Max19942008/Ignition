

services:
  motopresto:
    container_name: motopresto
    restart: always
    image: node:20.10.0
    ports:
      - "4000:3000"
    environment:
      - PORT=3000
    volumes:
      - ./:/usr/src/motopresto
    working_dir: /usr/src/motopresto
    networks:
      - client-network
    # FOR PRODUCTION
    command: sh -c "yarn && yarn build && yarn start"

networks:
  client-network:
    driver: bridge

