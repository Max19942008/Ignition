

services:
  moto-next:
    container_name: moto-next
    restart: always
    image: node:20.10.0
    ports:
      - "4000:3000"
    environment:
      - PORT=3000
    volumes:
      - ./:/usr/src/moto-next
    working_dir: /usr/src/moto-next
    networks:
      - client-network
    # FOR PRODUCTION
    command: sh -c "yarn && yarn build && yarn start"

networks:
  client-network:
    driver: bridge

